<html>

<head>
  <title>Hello!</title>

  <!--
  first do <head> 
  then do title in between with <title> text </title>
  then </head>
  now you have a title tag
  -->
  
</head>

<body>

  <h1>Hello, World!</h1>
   
  <!--
  <h1></h1> is how you make first level headings
  -->
 
  <p>Mankind knew that could not change society. So instead of reflecting on themselves, they blamed the beasts.</p>
     
  <!--
  <p></p> is how you make paragraph tags
  -->

  <h2>Heaven or Hell</h2>

  <!--
  <h2></h2> is how you make second-level heading tags
  -->

  * Metal Sonic
  * Mecha Knuckles
  * Tails Doll

  <!--
  adding a *, +, or - before a word will render the text as a bullet point
  -->

  1. Sonic
  2. Tails
  3. Knuckles

  <!--
  for numbered lists, you would need to add a number followed by a period. the space between the word and your period is important
  -->

[Check It Out](https://www.youtube.com/watch?v=fFeM7KWyshw)

<!--
to add links, you need to put text in between brackets for the link text
then right next to the brackets, add parenthesis and the URL inside
now you have a link
-->


<link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink:wght@100..900&display=swap" rel="stylesheet">
</body>
  
</html>
